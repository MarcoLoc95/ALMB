<meta charset="utf-8">
<style>
  .fivx {
    --ink:#1c1d22; --ink2:#565a66; --ink3:#8a8f9c;
    --ray:#e05020; --img:#1a47b8; --mark:#0d5e22;
    --lens:#D5ECFF; --lensedge:#6f86b3; --struct:#666;
    --line:#e6e8ee; --card:#f7f8fb; --bg:#ffffff;
    --fin:#b8531f; --inf:#1a47b8;
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--bg);
    max-width:750px; margin:0 auto; padding:4px 6px 10px;
    -webkit-font-smoothing:antialiased;
  }
  .fivx *{box-sizing:border-box;}
  .fivx h1{font-size:19px; line-height:1.25; margin:2px 0 3px; font-weight:650; letter-spacing:-.01em;}
  .fivx .sub{font-size:13.5px; color:var(--ink2); margin:0 0 12px; line-height:1.45;}
  .fivx .mono{font-family:"SF Mono","Cascadia Code","Roboto Mono",ui-monospace,Menlo,Consolas,monospace;}

  /* controls */
  .fivx .controls{
    display:flex; flex-wrap:wrap; align-items:center; gap:10px 16px;
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:11px 14px; margin-bottom:14px;
  }
  .fivx .ctl-label{font-size:12px; color:var(--ink2); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}
  .fivx .slider-wrap{display:flex; align-items:center; gap:8px; flex:1 1 320px; min-width:260px;}
  .fivx .stepbtn{
    border:1px solid var(--line); background:#fff; color:var(--ink); cursor:pointer;
    width:30px; height:30px; border-radius:8px; font-size:14px; line-height:1;
    display:flex; align-items:center; justify-content:center; transition:.12s;
  }
  .fivx .stepbtn:hover{background:#eef1f6; border-color:#cfd4de;}
  .fivx .stepbtn:active{transform:translateY(1px);}
  .fivx input[type=range]{flex:1; accent-color:var(--ray); height:4px; cursor:pointer;}
  .fivx .endcap{font-size:11px; color:var(--ink3); white-space:nowrap;}
  .fivx .toggle{display:flex; align-items:center; gap:7px; font-size:13px; color:var(--ink); cursor:pointer; user-select:none;}
  .fivx .toggle input{width:16px; height:16px; accent-color:var(--img); cursor:pointer;}

  /* optical bench */
  .fivx .bench{border:1px solid var(--line); border-radius:12px; padding:6px 8px 2px; margin-bottom:12px; background:#fff;}
  .fivx .benchhead{display:flex; align-items:baseline; justify-content:space-between; padding:4px 6px 2px;}
  .fivx .tag{font-size:12.5px; font-weight:700; letter-spacing:.01em; padding:2px 9px; border-radius:999px;}
  .fivx .tag-fin{color:#fff; background:var(--fin);}
  .fivx .tag-inf{color:#fff; background:var(--inf);}
  .fivx .mag{font-size:16px; font-weight:650;}
  .fivx .mag .note{font-size:12px; font-weight:500; color:var(--ink2); margin-left:6px;}
  .fivx svg{width:100%; height:auto; display:block;}
  .fivx text{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}

  /* viewfinder panes */
  .fivx .panes{display:flex; gap:18px; align-items:stretch; margin-top:4px;}
  .fivx .pane-obj{flex:0 0 32%;}
  .fivx .results{flex:1; display:flex; gap:12px; min-width:0;}
  .fivx .results .pane{flex:1;}
  .fivx .pane{margin:0; min-width:0;}
  .fivx .screen{
    position:relative; aspect-ratio:1/1; border-radius:12px; overflow:hidden;
    background:radial-gradient(circle at 50% 42%, #fdfdfd 0%, #eef0f4 78%, #e6e9ef 100%);
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
  }
  .fivx .screen.obj{background:radial-gradient(circle at 50% 42%, #fffef9 0%, #f2efe6 80%);}
  .fivx .ant{
    width:62%; height:auto; display:block;
    transform-origin:center;
    transition:transform .18s ease, filter .18s ease;
  }
  .fivx .pane-obj .ant{width:42%;}
  .fivx .badge{
    position:absolute; top:8px; left:8px; font-size:10.5px; font-weight:700;
    padding:2px 7px; border-radius:999px; letter-spacing:.02em;
  }
  .fivx .badge.ok{background:#e2f3e6; color:#0d5e22;}
  .fivx .badge.def{background:#fdeee0; color:#a85a16;}
  .fivx figcaption{font-size:12.5px; color:var(--ink2); margin-top:7px; text-align:center; line-height:1.35;}
  .fivx figcaption b{color:var(--ink); font-weight:650;}

  .fivx .takeaway{
    font-size:13px; color:var(--ink2); line-height:1.5; margin:16px 2px 2px;
    border-left:3px solid var(--ray); padding-left:12px;
  }
  .fivx .takeaway b{color:var(--ink);}

  @media (max-width:560px){
    .fivx h1{font-size:17px;}
    .fivx .panes{flex-direction:column;}
    .fivx .pane-obj{flex:auto;}
    .fivx .results{flex:auto;}
  }
  @media (prefers-reduced-motion:reduce){
    .fivx .ant{transition:none;} .fivx .stepbtn{transition:none;}
  }
</style>

<div class="fivx" id="fivx">
  <p class="sub">Move the specimen through the focal plane and watch each design respond.</p>

  <div class="controls">
    <span class="ctl-label">Specimen position</span>
    <div class="slider-wrap">
      <button class="stepbtn" id="btnLeft" aria-label="move specimen away from objective">&#9664;</button>
      <span class="endcap">farther</span>
      <input type="range" id="objSlider" min="0" max="100" value="50" step="1" aria-label="specimen position through focus">
      <span class="endcap">closer</span>
      <button class="stepbtn" id="btnRight" aria-label="move specimen toward objective">&#9654;</button>
    </div>
    <label class="toggle"><input type="checkbox" id="filterChk"> Insert glass filter in the light path</label>
  </div>

  <!-- FINITE -->
  <div class="bench">
    <div class="benchhead">
      <span class="tag tag-fin">Finite tube length</span>
      <span class="mag" id="magFin">4.0&times; <span class="note">= s<sub>i</sub> / s<sub>o</sub></span></span>
    </div>
    <svg id="svgFin" viewBox="0 50 900 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="ray diagram of a finite tube length microscope">
      <line x1="40" y1="180" x2="868" y2="180" stroke="#c9cdd6" stroke-width="1" stroke-dasharray="2 4"/>
      <!-- objective -->
      <path d="M300,70 Q320,180 300,290 Q280,180 300,70 Z" fill="var(--lens)" stroke="var(--lensedge)" stroke-width="1.4"/>
      <text x="300" y="305" text-anchor="middle" font-size="12" fill="var(--ink2)">objective</text>
      <!-- focal points -->
      <circle cx="208" cy="180" r="3" fill="var(--mark)"/><text x="208" y="198" text-anchor="middle" font-size="11" fill="var(--mark)">F</text>
      <circle cx="392" cy="180" r="3" fill="var(--mark)"/><text x="392" y="198" text-anchor="middle" font-size="11" fill="var(--mark)">F&#39;</text>
      <!-- screen -->
      <line id="finScreen" x1="760" y1="72" x2="760" y2="292" stroke="#3a3d45" stroke-width="3"/>
      <text x="760" y="64" text-anchor="middle" font-size="12" fill="var(--ink2)">image plane (camera)</text>
      <!-- tube length brace -->
      <line x1="300" y1="318" x2="760" y2="318" stroke="var(--struct)" stroke-width="1"/>
      <line x1="300" y1="314" x2="300" y2="322" stroke="var(--struct)" stroke-width="1"/>
      <line x1="760" y1="314" x2="760" y2="322" stroke="var(--struct)" stroke-width="1"/>
      <text x="530" y="332" text-anchor="middle" font-size="11.5" fill="var(--struct)">mechanical tube length (fixed)</text>
      <!-- glass filter -->
      <g id="finGlass" style="display:none">
        <rect x="556" y="80" width="34" height="205" rx="3" fill="#aebccb" opacity="0.55" stroke="#8593a4" stroke-width="1"/>
        <text x="573" y="278" text-anchor="middle" font-size="10.5" fill="#6f7d8e">glass</text>
      </g>
      <!-- rays -->
      <polyline id="finRay1" fill="none" stroke="var(--ray)" stroke-width="1.5"/>
      <polyline id="finRay2" fill="none" stroke="var(--ray)" stroke-width="1.5" opacity="0.85"/>
      <polyline id="finRay3" fill="none" stroke="var(--ray)" stroke-width="1.5" opacity="0.7"/>
      <!-- blur glow at screen -->
      <ellipse id="finBlur" cx="760" cy="180" rx="7" ry="2" fill="var(--ray)" opacity="0"/>
      <!-- object arrow -->
      <line id="finObjArrow" x1="185" y1="180" x2="185" y2="162" stroke="var(--ink)" stroke-width="2"/>
      <polygon id="finObjHead" points="185,155 180,165 190,165" fill="var(--ink)"/>
      <!-- image arrow -->
      <line id="finImgArrow" x1="760" y1="180" x2="760" y2="252" stroke="var(--img)" stroke-width="2"/>
      <polygon id="finImgHead" points="760,259 755,249 765,249" fill="var(--img)"/>
    </svg>
  </div>

  <!-- INFINITY -->
  <div class="bench">
    <div class="benchhead">
      <span class="tag tag-inf">Infinity corrected</span>
      <span class="mag" id="magInf">4.0&times; <span class="note">= f<sub>tube</sub> / f<sub>obj</sub></span></span>
    </div>
    <svg id="svgInf" viewBox="0 50 900 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="ray diagram of an infinity corrected microscope">
      <line x1="40" y1="180" x2="868" y2="180" stroke="#c9cdd6" stroke-width="1" stroke-dasharray="2 4"/>
      <!-- objective -->
      <path d="M240,70 Q260,180 240,290 Q220,180 240,70 Z" fill="var(--lens)" stroke="var(--lensedge)" stroke-width="1.4"/>
      <text x="240" y="305" text-anchor="middle" font-size="12" fill="var(--ink2)">objective</text>
      <!-- tube lens -->
      <path d="M560,70 Q580,180 560,290 Q540,180 560,70 Z" fill="var(--lens)" stroke="var(--lensedge)" stroke-width="1.4"/>
      <text x="560" y="305" text-anchor="middle" font-size="12" fill="var(--ink2)">tube lens</text>
      <!-- focal point -->
      <circle cx="120" cy="180" r="3" fill="var(--mark)"/><text x="120" y="198" text-anchor="middle" font-size="11" fill="var(--mark)">F</text>
      <!-- screen -->
      <line id="infScreen" x1="760" y1="72" x2="760" y2="292" stroke="#3a3d45" stroke-width="3"/>
      <text x="760" y="64" text-anchor="middle" font-size="12" fill="var(--ink2)">image plane (camera)</text>
      <!-- infinity space brace -->
      <line x1="240" y1="318" x2="560" y2="318" stroke="var(--struct)" stroke-width="1"/>
      <line x1="240" y1="314" x2="240" y2="322" stroke="var(--struct)" stroke-width="1"/>
      <line x1="560" y1="314" x2="560" y2="322" stroke="var(--struct)" stroke-width="1"/>
      <text x="400" y="332" text-anchor="middle" font-size="11.5" fill="var(--struct)">infinity space (collimated)</text>
      <!-- glass filter -->
      <g id="infGlass" style="display:none">
        <rect x="383" y="80" width="34" height="205" rx="3" fill="#aebccb" opacity="0.55" stroke="#8593a4" stroke-width="1"/>
        <text x="400" y="278" text-anchor="middle" font-size="10.5" fill="#6f7d8e">glass</text>
      </g>
      <!-- rays -->
      <polyline id="infRay1" fill="none" stroke="var(--ray)" stroke-width="1.5"/>
      <polyline id="infRay2" fill="none" stroke="var(--ray)" stroke-width="1.5" opacity="0.85"/>
      <polyline id="infRay3" fill="none" stroke="var(--ray)" stroke-width="1.5" opacity="0.7"/>
      <!-- blur glow at screen -->
      <ellipse id="infBlur" cx="760" cy="180" rx="7" ry="2" fill="var(--ray)" opacity="0"/>
      <!-- object arrow -->
      <line id="infObjArrow" x1="120" y1="180" x2="120" y2="162" stroke="var(--ink)" stroke-width="2"/>
      <polygon id="infObjHead" points="120,155 115,165 125,165" fill="var(--ink)"/>
      <!-- image arrow (fixed height) -->
      <line id="infImgArrow" x1="760" y1="180" x2="760" y2="252" stroke="var(--img)" stroke-width="2"/>
      <polygon id="infImgHead" points="760,259 755,249 765,249" fill="var(--img)"/>
    </svg>
  </div>

  <!-- PANES -->
  <div class="panes">
    <figure class="pane pane-obj">
      <div class="screen obj"><img class="ant" id="antObj" alt="specimen ant"></div>
      <figcaption>Specimen <span style="color:var(--ink3)">(object plane)</span></figcaption>
    </figure>
    <div class="results">
      <figure class="pane">
        <div class="screen"><span class="badge ok" id="badgeFin">in focus</span><img class="ant" id="antFin" alt="finite system image"></div>
        <figcaption>Finite: on screen &middot; <b id="capFin">4.0&times;</b></figcaption>
      </figure>
      <figure class="pane">
        <div class="screen"><span class="badge ok" id="badgeInf">in focus</span><img class="ant" id="antInf" alt="infinity system image"></div>
        <figcaption>Infinity: on screen &middot; <b id="capInf">4.0&times;</b></figcaption>
      </figure>
    </div>
  </div>
</div>

(function(){
  const $ = id => document.getElementById(id);
  ["antObj","antFin","antInf"].forEach(id => $(id).src = ANT);

  const slider = $("objSlider"), filterChk = $("filterChk");

  // --- geometry constants (SVG units) ---
  const LENS_F = 300, F_OBJ = 92, SCREEN_F = 760;    // finite (nominal magnification = 4x)
  const SO_NOM = 115;                                  // nominal object distance
  const D_F = SCREEN_F - LENS_F;                        // 460, lens->screen
  const AXIS = 180, TIPY = 162;                         // object tip height (short object)
  const LENS_I = 240, TUBE_I = 560, SCREEN_I = 760;    // infinity x

  function lerp(a,b,t){return a+(b-a)*t;}

  function update(){
    const t = +slider.value/100;
    const filt = filterChk.checked;

    // slider -> object distance (t=0.5 is nominal). left=farther(big so), right=closer(small so)
    const so = lerp(120,110,t);            // around nominal 115
    const defocus = so - SO_NOM;           // signed
    const adf = Math.abs(defocus);

    /* ---------- FINITE ---------- */
    const objX = LENS_F - so;              // object x
    const si = LENS_F_si(so);              // image distance
    const imgX = LENS_F + si;
    const imgTipY = AXIS + (AXIS-TIPY)*(si/so);   // inverted, grows with si/so

    // object arrow
    setArrow("finObjArrow","finObjHead", objX, true);
    // rays: 1 parallel-in -> back focal; 2 through center; 3 through front focal -> parallel-out
    // ray1
    $("finRay1").setAttribute("points",
      `${objX},${TIPY} ${LENS_F},${TIPY} ${clampX(imgX)},${rayY(LENS_F,TIPY,392,AXIS,clampX(imgX))}`);
    // ray2 (chief through lens center)
    $("finRay2").setAttribute("points",
      `${objX},${TIPY} ${LENS_F},${AXIS} ${clampX(imgX)},${rayY(objX,TIPY,LENS_F,AXIS,clampX(imgX))}`);
    // ray3 (through front focal 208,axis) then parallel out
    const y3 = rayY(objX,TIPY,208,AXIS,LENS_F);
    $("finRay3").setAttribute("points",
      `${objX},${TIPY} ${LENS_F},${y3} ${clampX(imgX)},${y3}`);

    // image arrow at geometric image plane
    setImgArrow("finImgArrow","finImgHead", clampX(imgX), imgTipY);

    // blur at screen: spread of ray1 vs chief at x=760
    const yChief760 = rayY(objX,TIPY,LENS_F,AXIS,SCREEN_F);
    const yR1_760   = rayY(LENS_F,TIPY,392,AXIS,SCREEN_F);
    let blurR = Math.abs(yR1_760 - yChief760)/2;
    const defocusBlurPx = Math.min(7, adf*1.0);        // same for both designs
    const blurPx_f = defocusBlurPx + (filt ? 4.5 : 0); // glass wrecks finite focus
    setBlur("finBlur", yChief760, blurR + (filt?9:0));

    // magnification (screen centroid D/so, nominal 4x)
    const mFin = 4 * (SO_NOM/so);

    /* ---------- INFINITY ---------- */
    const objXi = 120 - (so - SO_NOM);     // nominal 120 (front focal of objective)
    setArrow("infObjArrow","infObjHead", objXi, true);

    // beam in infinity space: parallel at nominal, fans with defocus
    const sBeam = 0.15;                     // visual tilt of collimated beam
    const verg  = defocus * 0.0016;         // fan factor
    // 3 rays from tip hitting objective top/center/bottom, exit with slopes
    const apT=128, apC=180, apB=232;
    const slopes=[sBeam-verg, sBeam, sBeam+verg];
    const aps=[apT,apC,apB];
    // post-tube convergence point: fixed height, focus shifts with defocus
    const focusShift = defocus * 3.4;
    const Pi = {x: SCREEN_I + focusShift, y: 252};
    for(let k=0;k<3;k++){
      const yL = aps[k];
      const yTube = yL + slopes[k]*(TUBE_I-LENS_I);
      $("infRay"+(k+1)).setAttribute("points",
        `${objXi},${TIPY} ${LENS_I},${yL} ${TUBE_I},${yTube} ${Pi.x},${Pi.y}`);
    }
    // image arrow sits where the rays actually intersect (Pi); height stays constant
    setImgArrow("infImgArrow","infImgHead", clampX(Pi.x), 252);
    // blur at screen for infinity (same defocus magnitude, filter has NO effect)
    setBlur("infBlur", 252, Math.abs(focusShift)*0.12);
    const blurPx_i = defocusBlurPx;

    const mInf = 4;

    /* ---------- glass blocks ---------- */
    $("finGlass").style.display = filt ? "" : "none";
    $("infGlass").style.display = filt ? "" : "none";

    /* ---------- panes ---------- */
    // finite ant: scale by mFin/4, blur by defocus(+filter), inverted image
    setAnt("antFin", mFin/4, blurPx_f, true);
    setAnt("antInf", 1.0, blurPx_i, true);    // infinity: constant size, inverted
    setAnt("antObj", 1.0, 0, false);          // specimen: upright

    // readouts
    $("magFin").innerHTML = mFin.toFixed(1)+'&times; <span class="note">= s<sub>i</sub> / s<sub>o</sub>' + (filt ? " &middot; image shifted, refocus moves M" : "") + "</span>";
    $("capFin").innerHTML = mFin.toFixed(1)+"&times;";
    $("capInf").innerHTML = "4.0&times;";

    const finDef = (blurPx_f>0.8);
    const infDef = (blurPx_i>0.8);
    badge("badgeFin", finDef);
    badge("badgeInf", infDef);
  }

  // image distance from thin lens eq
  function LENS_F_si(so){ return (F_OBJ*so)/(so-F_OBJ); }
  function rayY(x1,y1,x2,y2,x){ const m=(y2-y1)/(x2-x1); return y1+m*(x-x1); }
  function clampX(x){ return Math.max(40, Math.min(868, x)); }
  function lerpToScreen(P, sx){ // y where line from tube exit to P crosses screen ~ use P.y (approx)
    return P.y;
  }
  function setArrow(lineId, headId, x, up){
    const tip = up ? TIPY : (AXIS + (AXIS-TIPY));
    $(lineId).setAttribute("x1",x); $(lineId).setAttribute("x2",x);
    $(lineId).setAttribute("y1",AXIS); $(lineId).setAttribute("y2",tip);
    const hy = up ? tip-7 : tip+7;
    const dir = up ? 1 : -1;
    $(headId).setAttribute("points", `${x},${hy} ${x-5},${hy+10*dir} ${x+5},${hy+10*dir}`);
  }
  function setImgArrow(lineId, headId, x, tipY){
    $(lineId).setAttribute("x1",x); $(lineId).setAttribute("x2",x);
    $(lineId).setAttribute("y1",AXIS); $(lineId).setAttribute("y2",tipY);
    const hy = tipY+7;
    $(headId).setAttribute("points", `${x},${hy} ${x-5},${hy-10} ${x+5},${hy-10}`);
  }
  function setBlur(id, cy, r){
    const el=$(id);
    el.setAttribute("cy",cy);
    el.setAttribute("ry",Math.max(2,Math.min(40,r)));
    el.setAttribute("opacity", r>3 ? Math.min(0.35, (r-3)*0.03) : 0);
  }
  function setAnt(id, scale, blurPx, invert){
    const el=$(id);
    el.style.transform = `scale(${scale.toFixed(3)})` + (invert ? " rotate(180deg)" : "");
    el.style.filter = blurPx>0.05 ? `blur(${blurPx.toFixed(1)}px)` : "none";
  }
  function badge(id, defocused){
    const el=$(id);
    if(defocused){ el.textContent="defocused"; el.className="badge def"; }
    else { el.textContent="in focus"; el.className="badge ok"; }
  }

  slider.addEventListener("input", update);
  filterChk.addEventListener("change", update);
  $("btnLeft").addEventListener("click", ()=>{ slider.value=Math.max(0,+slider.value-5); update(); });
  $("btnRight").addEventListener("click", ()=>{ slider.value=Math.min(100,+slider.value+5); update(); });
  update();
})();
</script>

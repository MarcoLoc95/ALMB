<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Airy disk</title>
<style>body{margin:0;padding:24px;background:#f0f0f0;}</style>
</head>
<body>
<!-- WIDGET START -->
<div id="airy-widget" class="almb-widget">
  <style>
    #airy-widget.almb-widget{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;max-width:640px;margin:1.2em auto;padding:18px 22px 16px;background:#fff;border:1px solid #e6e6e6;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);color:#222;box-sizing:border-box;}
    #airy-widget .ctrls{display:flex;flex-direction:column;gap:11px;margin-bottom:14px;}
    #airy-widget .row{display:grid;grid-template-columns:210px 1fr;align-items:center;gap:14px;}
    #airy-widget .lab{font-size:14px;font-variant-numeric:tabular-nums;color:#333;white-space:nowrap;}
    #airy-widget .lab b{color:#e05020;font-weight:600;}
    #airy-widget input[type=range]{width:100%;accent-color:#e05020;height:22px;cursor:pointer;}
    #airy-widget .panels{display:flex;flex-wrap:wrap;gap:22px;justify-content:center;}
    #airy-widget .panel{flex:1 1 240px;max-width:270px;}
    #airy-widget .ptitle{font-size:13px;color:#444;text-align:center;margin-bottom:6px;font-weight:600;}
    #airy-widget .canrow{display:flex;align-items:stretch;gap:7px;}
    #airy-widget canvas{width:100%;height:auto;display:block;border-radius:3px;image-rendering:auto;background:#000;}
    #airy-widget .cbar{width:13px;border-radius:2px;flex:0 0 auto;}
    #airy-widget .cbwrap{display:flex;flex-direction:column;justify-content:space-between;font-size:10px;color:#888;padding:1px 0;}
    #airy-widget .hint{font-size:12.5px;color:#777;margin-top:12px;line-height:1.45;text-align:center;}
    @media (max-width:460px){#airy-widget .row{grid-template-columns:1fr;gap:2px;}}
  </style>
  <div class="ctrls">
    <div class="row"><span class="lab" id="aw-l-lab">Wavelength <b>&lambda;</b> = 500 nm</span><input type="range" id="aw-l" min="300" max="700" step="1" value="500"></div>
    <div class="row"><span class="lab" id="aw-d-lab">Aperture diameter <b>d</b> = 50 &mu;m</span><input type="range" id="aw-d" min="50" max="300" step="1" value="50"></div>
    <div class="row"><span class="lab" id="aw-D-lab">Distance <b>D</b> = 1.0 m</span><input type="range" id="aw-D" min="0.2" max="10" step="0.1" value="1"></div>
  </div>
  <div class="panels">
    <div class="panel"><div class="ptitle">Linear scale</div>
      <div class="canrow"><canvas id="aw-lin" width="300" height="300"></canvas>
        <div class="cbar" id="aw-cb-lin"></div><div class="cbwrap"><span>1</span><span>0</span></div></div></div>
    <div class="panel"><div class="ptitle">Logarithmic scale</div>
      <div class="canrow"><canvas id="aw-log" width="300" height="300"></canvas>
        <div class="cbar" id="aw-cb-log"></div><div class="cbwrap"><span>high</span><span>low</span></div></div></div>
  </div>
  <div class="hint">Field of view: 20&nbsp;cm &times; 20&nbsp;cm on the screen. The logarithmic panel reveals the faint outer rings that the eye would otherwise miss.</div>
  <script>
  (function(){
    var V=[68,1,84,70,8,92,71,16,99,72,24,106,72,31,112,72,38,119,71,45,123,70,52,128,68,58,131,66,65,134,63,71,136,61,77,138,58,83,139,56,89,140,53,95,141,50,100,142,48,106,142,46,111,142,43,116,142,41,121,142,39,126,142,37,131,142,35,136,142,33,142,141,32,146,140,31,152,139,30,157,137,31,162,135,34,167,133,37,172,130,44,177,126,50,182,122,59,187,117,68,191,112,80,196,106,90,200,100,103,204,92,115,208,86,127,211,78,142,214,69,155,217,60,170,220,50,184,222,41,200,224,32,213,226,26,229,228,25,241,229,29,253,231,37];
    var NV=V.length/3;
    function vir(t,out){ if(t<0)t=0; else if(t>1)t=1; var f=t*(NV-1),i=f|0; if(i>=NV-1){i=NV-2;} var g=f-i,a=i*3,b=a+3; out[0]=V[a]+(V[b]-V[a])*g; out[1]=V[a+1]+(V[b+1]-V[a+1])*g; out[2]=V[a+2]+(V[b+2]-V[a+2])*g; }
    // Bessel J1 (Abramowitz & Stegun)
    function J1(x){var ax=Math.abs(x),y,a1,a2,r;
      if(ax<8){y=x*x;
        a1=x*(72362614232.0+y*(-7895059235.0+y*(242396853.1+y*(-2972611.439+y*(15704.48260+y*(-30.16036606))))));
        a2=144725228442.0+y*(2300535178.0+y*(18583304.74+y*(99447.43394+y*(376.9991397+y))));
        r=a1/a2;
      } else {var z=8/ax,w=z*z,xx=ax-2.356194491;
        a1=1+w*(0.183105e-2+w*(-0.3516396496e-4+w*(0.2457520174e-5+w*(-0.240337019e-6))));
        a2=0.04687499995+w*(-0.2002690873e-3+w*(0.8449199096e-5+w*(-0.88228987e-6+w*0.105787412e-6)));
        r=Math.sqrt(0.636619772/ax)*(Math.cos(xx)*a1-z*Math.sin(xx)*a2); if(x<0)r=-r;}
      return r;}
    function airyI(arg){ if(Math.abs(arg)<1e-8) return 1; var v=2*J1(arg)/arg; return v*v; }

    var sL=document.getElementById("aw-l"),sd=document.getElementById("aw-d"),sD=document.getElementById("aw-D");
    var lL=document.getElementById("aw-l-lab"),ld=document.getElementById("aw-d-lab"),lD=document.getElementById("aw-D-lab");
    var cLin=document.getElementById("aw-lin"),cLog=document.getElementById("aw-log");
    var gLin=cLin.getContext("2d"),gLog=cLog.getContext("2d");
    var Wp=cLin.width,Hp=cLin.height, half=0.1; // screen half-size in metres (+/- 10 cm)
    var imgL=gLin.createImageData(Wp,Hp), imgG=gLog.createImageData(Wp,Hp);
    var dL=imgL.data, dG=imgG.data;
    var LUTN=1600, rmax=Math.SQRT2*half, lut=new Float64Array(LUTN+1);
    var LOGFLOOR=1e-5, LOGSPAN=-Math.log10(LOGFLOOR);
    var col=[0,0,0];

    // colourbars (CSS gradients built once)
    (function(){var stops=[];for(var i=0;i<NV;i++){stops.push("rgb("+V[i*3]+","+V[i*3+1]+","+V[i*3+2]+") "+(i/(NV-1)*100).toFixed(1)+"%");}
      var grad="linear-gradient(to top,"+stops.join(",")+")";
      document.getElementById("aw-cb-lin").style.background=grad;
      document.getElementById("aw-cb-log").style.background=grad;})();

    function update(){
      var lam=+sL.value*1e-9, d=+sd.value*1e-6, D=+sD.value;
      lL.innerHTML="Wavelength <b>&lambda;</b> = "+sL.value+" nm";
      ld.innerHTML="Aperture diameter <b>d</b> = "+sd.value+" &mu;m";
      lD.innerHTML="Distance <b>D</b> = "+(+sD.value).toFixed(1)+" m";
      var c=Math.PI*d/(lam*D);               // arg = c * r
      for(var j=0;j<=LUTN;j++){ lut[j]=airyI(c*(j/LUTN*rmax)); }
      var cx=(Wp-1)/2, cy=(Hp-1)/2, sx=(2*half)/(Wp-1), inv=LUTN/rmax, k=0;
      for(var py=0;py<Hp;py++){
        var Ym=(py-cy)*sx;
        for(var px=0;px<Wp;px++){
          var Xm=(px-cx)*sx, r=Math.sqrt(Xm*Xm+Ym*Ym);
          var idx=(r*inv)|0; if(idx>LUTN)idx=LUTN;
          var I=lut[idx];
          vir(I,col); dL[k]=col[0]; dL[k+1]=col[1]; dL[k+2]=col[2]; dL[k+3]=255;
          var tl=(Math.log10(I<LOGFLOOR?LOGFLOOR:I)+LOGSPAN)/LOGSPAN;
          vir(tl,col); dG[k]=col[0]; dG[k+1]=col[1]; dG[k+2]=col[2]; dG[k+3]=255;
          k+=4;
        }
      }
      gLin.putImageData(imgL,0,0); gLog.putImageData(imgG,0,0);
    }
    [sL,sd,sD].forEach(function(s){s.addEventListener("input",update);});
    update();
  })();
  </script>
</div>
<!-- WIDGET END -->
</body>
</html>

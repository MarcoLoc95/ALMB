<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Digital zoom and the resolution limit</title>
<style>
  :root{
    --ink:#1c2530; --muted:#5b6770; --accent:#e05020; --line:#dfe3e8; --track:#d9dde2;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:transparent; color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; padding:8px;
  }
  .wrap{max-width:540px; margin:0 auto;}
  .stage{
    position:relative; width:100%; aspect-ratio:1/1;
    background:#000; border:1px solid var(--line); border-radius:10px; overflow:hidden;
  }
  canvas{display:block; width:100%; height:100%;}
  .readout{
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:12.5px; color:var(--muted); margin:12px 2px 2px; letter-spacing:.02em;
  }
  .readout b{color:var(--ink); font-weight:600;}
  .controls{margin:12px 2px 4px;}
  .controls label{
    display:block; font-size:11px; text-transform:uppercase; letter-spacing:.14em;
    color:var(--muted); margin-bottom:8px;
  }
  input[type=range]{
    -webkit-appearance:none; appearance:none; width:100%; height:4px; border-radius:4px;
    background:linear-gradient(90deg,var(--accent) 0%,var(--accent) var(--fill,0%),var(--track) var(--fill,0%),var(--track) 100%);
    outline:none; cursor:pointer; margin:0;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none; width:18px; height:18px; border-radius:50%;
    background:#fff; border:3px solid var(--accent); cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.25);
  }
  input[type=range]::-moz-range-thumb{
    width:16px; height:16px; border-radius:50%;
    background:#fff; border:3px solid var(--accent); cursor:pointer;
  }
  input[type=range]:focus-visible{box-shadow:0 0 0 3px rgba(224,80,32,.30);}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage"><canvas id="cv"></canvas></div>
  <div class="readout">field of view&nbsp; <b id="fov">125 &micro;m</b></div>
  <div class="controls">
    <label for="z">Zoom into the center</label>
    <input id="z" type="range" min="0" max="1000" value="0">
  </div>
</div>

<script>
(function(){
  const SRC = 1024;              // source image is 1024 x 1024 px
  const UM_PER_PX = 10/82;       // printed scale bar: 82 px = 10 um
  const PX_PER_UM = 82/10;       // source px per um
  const M_MIN = 1, M_MAX = 24;   // digital magnification range
  const R_ORIG = 1.3;            // intrinsic blur (source px) ~ the optical resolution

  const img = new Image();
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const fovEl = document.getElementById('fov');
  const slider = document.getElementById('z');

  let M = M_MIN;

  function sizeCanvas(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const cssW = cv.clientWidth || 520;
    cv.width = Math.round(cssW * dpr);
    cv.height = cv.width;
  }

  function niceUm(target){            // round target (um) to 1/2/5 x 10^n
    if(target<=0) return 1;
    const p = Math.pow(10, Math.floor(Math.log10(target)));
    const f = target/p;
    const n = f<1.5?1 : f<3.5?2 : f<7.5?5 : 10;
    return n*p;
  }
  function fmtUm(u){
    if(u>=1) return (Math.round(u*10)/10).toString().replace(/\.0$/,'');
    if(u>=0.1) return u.toFixed(1);
    return u.toFixed(2);
  }

  function render(){
    if(!img.complete || !img.naturalWidth) return;
    const W = cv.width;
    const vw = SRC / M;                       // source px shown across the canvas
    const vx = (SRC - vw)/2, vy = (SRC - vw)/2;
    const s  = W / vw;                         // backing px per source px
    const blur = R_ORIG * s;                   // optical blur grows with magnification

    ctx.save();
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,W);
    ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
    ctx.filter = 'blur(' + blur.toFixed(2) + 'px)';
    ctx.drawImage(img, vx, vy, vw, vw, 0, 0, W, W);
    ctx.filter = 'none';
    ctx.restore();

    // dynamic scale bar (bottom-right)
    const pxPerUmDisp = PX_PER_UM * s;
    const um = niceUm((0.22*W)/pxPerUmDisp);
    const barPx = um*pxPerUmDisp;
    const pad = 0.045*W;
    const x1 = W - pad - barPx, x0b = W - pad, y = W - pad;
    const h = Math.max(2, W*0.006);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(x1-8, y-h-0.052*W, barPx+16, 0.052*W+h+6);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x1, y-h, barPx, h);
    ctx.font = '600 ' + Math.round(W*0.028) + 'px ui-monospace,Menlo,monospace';
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText(fmtUm(um)+' \u00b5m', (x1+x0b)/2, y-h-0.012*W);

    const fovUm = vw * UM_PER_PX;
    fovEl.innerHTML = (fovUm>=10?Math.round(fovUm):fovUm.toFixed(1)) + ' &micro;m';
  }

  function onSlide(){
    const t = slider.value/1000;
    M = M_MIN * Math.pow(M_MAX/M_MIN, t);       // log-scaled zoom
    slider.style.setProperty('--fill', (t*100)+'%');
    render();
  }

  slider.addEventListener('input', onSlide);
  window.addEventListener('resize', function(){ sizeCanvas(); render(); });
  img.onload = function(){ sizeCanvas(); onSlide(); };

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{--ink:#1f2933;--muted:#5b6670;--line:#d7dde3;--red:#d8362f;}
  *{box-sizing:border-box}
  .kohler{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);max-width:820px;margin:0 auto;}
  .kohler h3{font-size:1.02rem;font-weight:600;margin:0 0 .5rem;text-align:center}
  .stage{background:#0a0a0a;border-radius:10px;overflow:hidden;line-height:0}
  canvas{width:100%;height:auto;display:block}
  .controls{display:grid;grid-template-columns:1fr 1fr;gap:14px 22px;margin:14px 2px 2px}
  @media(max-width:560px){.controls{grid-template-columns:1fr}}
  .ctl label{display:flex;justify-content:space-between;align-items:baseline;
    font-size:.86rem;font-weight:600;margin-bottom:5px;color:var(--red)}
  .ctl .pct{font-weight:500;color:var(--muted);font-variant-numeric:tabular-nums}
  .ctl input[type=range]{width:100%;accent-color:var(--red)}
  .ctl .hint{font-size:.76rem;color:var(--muted);margin-top:5px;line-height:1.3}
</style>
</head>
<body>
<div class="kohler">
  <h3>Field vs condenser diaphragm</h3>
  <div class="stage"><canvas id="cv" width="1640" height="754"></canvas></div>
  <div class="controls">
    <div class="ctl">
      <label for="field">Field diaphragm <span class="pct" id="fieldPct">90% open</span></label>
      <input type="range" id="field" min="15" max="100" value="90">
      <div class="hint">Sits in a plane conjugate to the sample. Sets the <b>size</b> of the illuminated area.</div>
    </div>
    <div class="ctl">
      <label for="cond">Condenser diaphragm <span class="pct" id="condPct">70% open</span></label>
      <input type="range" id="cond" min="15" max="100" value="70">
      <div class="hint">Sits in a plane conjugate to the source. Sets the illumination <b>cone (NA)</b> and <b>brightness</b>.</div>
    </div>
  </div>
</div>

<script>
(function(){
  // ---- 4f layout (world units): f1 = f2 = 2 ----
  var f1=2.0, f2=2.0;
  var SRCX=0.0, FD=2.0, L1=4.0, AD=8.0, L2=10.0, SAMP=12.0, END=13.6;
  var aLENS=1.7;
  var SRC=[]; for(var i=0;i<5;i++) SRC.push(-0.32+0.64*i/4);
  var FAN=[]; for(var j=0;j<9;j++) FAN.push(-0.33+0.66*j/8);   // centred on the axis (parallel)
  var COLORS=["#4fc3f7","#74d68a","#ffe24f","#ffab4d","#ef6f6f"]; // one hue per source point

  function aF(){ return 0.10 + (field.value/100)*(1.00-0.10); }
  function aC(){ return 0.06 + (cond.value/100)*(0.42-0.06); }

  function trace(ys,u,af,ac){
    var pts=[[0,ys]], x=0, y=ys;
    y+=u*(FD-x); x=FD; pts.push([x,y]);
    if(Math.abs(y)>af) return {pts:pts,reached:false};
    y+=u*(L1-x); x=L1;
    if(Math.abs(y)>aLENS){pts.push([x,y]); return {pts:pts,reached:false};}
    pts.push([x,y]); u-=y/f1;
    y+=u*(AD-x); x=AD; pts.push([x,y]);
    if(Math.abs(y)>ac) return {pts:pts,reached:false};
    y+=u*(L2-x); x=L2;
    if(Math.abs(y)>aLENS){pts.push([x,y]); return {pts:pts,reached:false};}
    pts.push([x,y]); u-=y/f2;
    y+=u*(SAMP-x); x=SAMP; pts.push([x,y]); var ysamp=y;
    y+=u*(END-x); x=END; pts.push([x,y]);
    return {pts:pts,reached:true,ysamp:ysamp};
  }

  var maxRays=0;
  (function(){var n=0; SRC.forEach(function(ys){FAN.forEach(function(u){
     if(trace(ys,u,1.00,0.42).reached)n++;});}); maxRays=n;})();

  var cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  var field=document.getElementById('field'), cond=document.getElementById('cond');
  var W,H,sx,sy;
  var X0=-0.5, X1=END+0.2, Y0=-1.85, Y1=1.85;

  function resize(){
    var cssW=cv.clientWidth||800, dpr=window.devicePixelRatio||1;
    W=cssW; H=Math.round(cssW*0.46);
    cv.width=W*dpr; cv.height=H*dpr; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    var mL=12,mR=12,mT=26,mB=34;
    var scaleX=(W-mL-mR)/(X1-X0), scaleY=(H-mT-mB)/(Y1-Y0);
    sx=function(x){return mL+(x-X0)*scaleX;};
    sy=function(y){return mT+(Y1-y)*scaleY;};
    draw();
  }

  function lens(cx){
    var x=sx(cx), top=sy(1.45), bot=sy(-1.45), b=15;
    ctx.beginPath(); ctx.moveTo(x,top);
    ctx.quadraticCurveTo(x+b,(top+bot)/2,x,bot);
    ctx.quadraticCurveTo(x-b,(top+bot)/2,x,top);
    ctx.closePath();
    ctx.fillStyle='rgba(150,196,230,0.80)'; ctx.fill();
    ctx.lineWidth=1.2; ctx.strokeStyle='#e3f0fb'; ctx.stroke();
  }
  function diaphragm(cx,ap){
    var x=sx(cx);
    ctx.strokeStyle='#d8362f'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(x,sy(1.8)); ctx.lineTo(x,sy(ap)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,sy(-1.8)); ctx.lineTo(x,sy(-ap)); ctx.stroke();
    ctx.fillStyle='#d8362f';
    [[ap,-1],[-ap,1]].forEach(function(p){var yy=sy(p[0]),d=6*p[1];
      ctx.beginPath(); ctx.moveTo(x,yy); ctx.lineTo(x-4,yy+d); ctx.lineTo(x+4,yy+d); ctx.closePath(); ctx.fill();});
  }
  function topLabel(cx,t,color){
    ctx.fillStyle=color||'#cfd6dd'; ctx.font='600 12px -apple-system,Segoe UI,Roboto,Arial';
    ctx.textAlign='center'; ctx.fillText(t,sx(cx),17);
  }
  function botLabel2(cx,l1,l2){
    ctx.fillStyle='#ef6b66'; ctx.font='600 12px -apple-system,Segoe UI,Roboto,Arial';
    ctx.textAlign='center'; ctx.fillText(l1,sx(cx),H-19); ctx.fillText(l2,sx(cx),H-6);
  }

  function draw(){
    var af=aF(), ac=aC();
    ctx.clearRect(0,0,W,H); ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#262626'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(sx(X0),sy(0)); ctx.lineTo(sx(X1),sy(0)); ctx.stroke();

    var survY=[], nray=0;
    SRC.forEach(function(ys,si){ FAN.forEach(function(u){
      var r=trace(ys,u,af,ac), p=r.pts;
      ctx.beginPath(); ctx.moveTo(sx(p[0][0]),sy(p[0][1]));
      for(var k=1;k<p.length;k++) ctx.lineTo(sx(p[k][0]),sy(p[k][1]));
      if(r.reached){ ctx.strokeStyle=COLORS[si]; ctx.globalAlpha=0.9; ctx.lineWidth=1.1; survY.push(r.ysamp); nray++; }
      else { ctx.strokeStyle='#8c8228'; ctx.globalAlpha=0.18; ctx.lineWidth=0.8; }
      ctx.stroke(); ctx.globalAlpha=1.0;
    });});

    lens(L1); lens(L2);
    ctx.strokeStyle='#2f6fc4'; ctx.lineWidth=3.5;
    ctx.beginPath(); ctx.moveTo(sx(SAMP),sy(1.45)); ctx.lineTo(sx(SAMP),sy(-1.45)); ctx.stroke();
    if(survY.length){
      var lo=Math.min.apply(null,survY), hi=Math.max.apply(null,survY), b=nray/maxRays;
      ctx.strokeStyle='rgba(127,208,255,'+(0.30+0.65*b).toFixed(2)+')'; ctx.lineWidth=7; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(sx(SAMP),sy(hi)); ctx.lineTo(sx(SAMP),sy(lo)); ctx.stroke(); ctx.lineCap='butt';
    }
    diaphragm(FD,af); diaphragm(AD,ac);
    SRC.forEach(function(ys,si){ ctx.fillStyle=COLORS[si]; ctx.beginPath(); ctx.arc(sx(0),sy(ys),3.5,0,7); ctx.fill(); });

    topLabel(L1,'Field lens'); topLabel(L2,'Condenser lens'); topLabel(SAMP,'sample','#8fb8e8');
    botLabel2(FD,'Field','diaphragm'); botLabel2(AD,'Condenser','diaphragm');
  }

  function sync(){
    document.getElementById('fieldPct').textContent=field.value+'% open';
    document.getElementById('condPct').textContent=cond.value+'% open'; draw();
  }
  field.addEventListener('input',sync); cond.addEventListener('input',sync);
  window.addEventListener('resize',resize);
  resize(); sync();
})();
</script>
</body>
</html>
